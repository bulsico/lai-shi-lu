<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" fill="#0D0D0D"/>
  <!-- Signature red danger stripe -->
  <rect width="32" height="2" fill="#E8001A"/>
  <!-- Upper wick -->
  <rect x="15" y="4" width="2" height="5" fill="#E8001A"/>
  <!-- Bearish candle body -->
  <rect x="10" y="9" width="12" height="15" fill="#E8001A"/>
  <!-- Lower wick -->
  <rect x="15" y="24" width="2" height="4" fill="#E8001A"/>
</svg>
